<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-container{
            background:#fff;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.2);
            width:350px;
            text-align:center;
        }

        h2{
            margin-bottom:20px;
            color:#333;
        }

        .input-group{
            margin-bottom:20px;
            text-align:left;
        }

        .input-group label{
            display:block;
            margin-bottom:5px;
            color:#555;
        }

        .input-group input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        .btn-login{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#007BFF;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        .btn-login:hover{
            background:#0056b3;
        }

        .links{
            margin-top:15px;
        }

        .links a{
            color:#007BFF;
            text-decoration:none;
            font-size:14px;
        }

        .links a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Iniciar Sesión</h2>

    <!-- El formulario ahora envía los datos a login.php -->
    <form action="login.php" method="POST">

        <div class="input-group">
            <label for="usuario">Usuario</label>
            <input
                type="text"
                id="usuario"
                name="usuario"
                placeholder="Ingresa tu usuario"
                required>
        </div>

        <div class="input-group">
            <label for="password">Contraseña</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Ingresa tu contraseña"
                required>
        </div>

        <button type="submit" class="btn-login">Ingresar</button>

    </form>

    <div class="links">
        <p><a href="#">¿Olvidaste tu contraseña?</a></p>
        <p><a href="#">Crear una cuenta</a></p>
    </div>
</div>

</body>
</html>
